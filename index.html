<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>勾腕识别工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #header {
            padding: 8px;
            text-align: center;
            z-index: 10;
            background: #1a1a2e;
        }
        
        h1 { font-size: 18px; }
        #status { font-size: 12px; color: #aaa; margin-top: 2px; }
        
        #main {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }
        
        #input_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        #alert-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            z-index: 100;
            text-align: center;
        }
        
        #angle-display {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 50;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        #start-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: #00d4aa;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #debug-info {
            position: fixed;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #0f0;
            z-index: 300;
            max-width: 300px;
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
        }
        
        #camera-row {
            display: none;
            justify-content: center;
            gap: 10px;
            padding: 5px;
            z-index: 10;
        }
        
        #camera-select {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            background: #333;
            color: white;
            font-size: 14px;
        }
        
        #switch-cam-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: #0066cc;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 style="font-size:28px; margin-bottom:10px;">✍️ 勾腕识别</h1>
        <p style="color:#aaa; text-align:center; padding:0 20px;">
            需要摄像头权限<br>
            请确保能拍到肩膀和手臂
        </p>
        <button id="start-btn">📷 开启摄像头</button>
    </div>

    <div id="header" style="display:none;">
        <h1>勾腕识别</h1>
        <div id="status">初始化...</div>
    </div>
    
    <div id="camera-row">
        <select id="camera-select"><option>加载中...</option></select>
        <button id="switch-cam-btn">🔄 切换</button>
    </div>
    
    <div id="main" style="display:none;">
        <video id="input_video" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div id="alert-box">
        ⚠️ 勾腕 detected！<br>
        <span style="font-size:14px">请调整手腕姿势</span>
    </div>
    
    <div id="angle-display">角度: --°</div>
    <div id="debug-info">等待启动...</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const alertBox = document.getElementById('alert-box');
        const angleDisplay = document.getElementById('angle-display');
        const statusDiv = document.getElementById('status');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const mainDiv = document.getElementById('main');
        const headerDiv = document.getElementById('header');
        const debugInfo = document.getElementById('debug-info');
        const cameraRow = document.getElementById('camera-row');
        const cameraSelect = document.getElementById('camera-select');
        const switchCamBtn = document.getElementById('switch-cam-btn');

        const GOUWAN_THRESHOLD = 35;
        let isRunning = false;
        let holistic = null;
        let currentStream = null;
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let modelReady = false;

        function log(msg) {
            console.log(msg);
            const time = new Date().toLocaleTimeString();
            debugInfo.innerHTML += `<br>[${time}] ${msg}`;
            debugInfo.scrollTop = debugInfo.scrollHeight;
        }

        // ========== 摄像头 ==========
        async function getCameras() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, i) => {
                    const opt = document.createElement('option');
                    opt.value = device.deviceId;
                    opt.textContent = device.label || `摄像头 ${i+1}`;
                    cameraSelect.appendChild(opt);
                });
                
                const backIdx = videoDevices.findIndex(d => 
                    d.label.toLowerCase().includes('back') || 
                    d.label.toLowerCase().includes('environment') ||
                    d.label.includes('后置')
                );
                if (backIdx >= 0) {
                    cameraSelect.selectedIndex = backIdx;
                    currentDeviceIndex = backIdx;
                }
                
                cameraRow.style.display = 'flex';
                return true;
            } catch (e) {
                log('枚举失败: ' + e.message);
                return false;
            }
        }

        async function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }

            const constraints = {
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    deviceId: deviceId ? { exact: deviceId } : undefined
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                videoElement.srcObject = stream;
                
                await new Promise((resolve, reject) => {
                    videoElement.onloadedmetadata = resolve;
                    videoElement.onerror = reject;
                    setTimeout(() => reject(new Error('超时')), 10000);
                });
                
                await videoElement.play();
                
                const vw = videoElement.videoWidth || 640;
                const vh = videoElement.videoHeight || 480;
                canvasElement.width = vw;
                canvasElement.height = vh;
                
                log(`视频就绪: ${vw}x${vh}`);
                return true;
                
            } catch (e) {
                log('摄像头失败: ' + e.message);
                alert('摄像头启动失败: ' + e.message);
                return false;
            }
        }

        switchCamBtn.addEventListener('click', async () => {
            if (videoDevices.length < 2) {
                alert('只有一个摄像头');
                return;
            }
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            cameraSelect.selectedIndex = currentDeviceIndex;
            await startCamera(videoDevices[currentDeviceIndex].deviceId);
        });

        cameraSelect.addEventListener('change', async () => {
            await startCamera(cameraSelect.value);
        });

        // ========== 启动 ==========
        startBtn.addEventListener('click', async () => {
            startBtn.textContent = '启动中...';
            startBtn.disabled = true;

            await getCameras();
            const ok = await startCamera(cameraSelect.value);
            if (!ok) {
                startBtn.textContent = '重试';
                startBtn.disabled = false;
                return;
            }

            startScreen.style.display = 'none';
            mainDiv.style.display = 'flex';
            headerDiv.style.display = 'block';
            statusDiv.textContent = '加载模型...';

            // 初始化 Holistic
            await initHolistic();
        });

        // ========== 初始化 Holistic ==========
        async function initHolistic() {
            log('创建 Holistic...');
            
            return new Promise((resolve, reject) => {
                holistic = new Holistic({
                    locateFile: (file) => {
                        log('加载: ' + file);
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
                    }
                });

                holistic.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: false,
                    refineFaceLandmarks: false,
                    minDetectionConfidence: 0.3,
                    minTrackingConfidence: 0.3
                });

                // 关键：第一次 onResults 表示模型就绪
                let firstResult = true;
                holistic.onResults((results) => {
                    if (firstResult) {
                        firstResult = false;
                        modelReady = true;
                        log('✅ 模型首次检测到结果');
                        statusDiv.textContent = '检测中...';
                    }
                    onResults(results);
                });

                log('Holistic 创建完成，等待模型就绪...');
                
                // 发送一帧测试
                setTimeout(async () => {
                    try {
                        log('发送测试帧...');
                        await holistic.send({ image: videoElement });
                        log('测试帧发送成功');
                        isRunning = true;
                        processFrame();
                        resolve();
                    } catch (e) {
                        log('测试帧失败: ' + e.message);
                        reject(e);
                    }
                }, 1000); // 等1秒让 WASM 初始化
            });
        }

        // ========== 处理结果 ==========
        function onResults(results) {
            log('onResults 触发'); // 关键日志
            
            const w = canvasElement.width;
            const h = canvasElement.height;
            
            canvasCtx.clearRect(0, 0, w, h);

            const pose = results.poseLandmarks;
            const leftHand = results.leftHandLandmarks;
            const rightHand = results.rightHandLandmarks;

            let hand = null;
            let isLeft = false;
            
            if (leftHand) {
                hand = leftHand;
                isLeft = true;
            } else if (rightHand) {
                hand = rightHand;
                isLeft = false;
            }

            log(`Pose:${!!pose} Hand:${!!hand} Left:${isLeft}`);

            // 情况1：有 Pose 有 Hand
            if (pose && hand) {
                const result = calcAngle(pose, hand, isLeft);
                drawAll(pose, hand, isLeft, result, w, h);
                
                if (result) {
                    angleDisplay.textContent = `手腕: ${result.angle.toFixed(1)}°`;
                    
                    if (result.angle < (180 - GOUWAN_THRESHOLD) && result.isBendingInward) {
                        alertBox.style.display = 'block';
                        angleDisplay.style.background = 'rgba(255, 0, 0, 0.8)';
                        statusDiv.textContent = '⚠️ 勾腕！';
                        statusDiv.style.color = '#ff4444';
                        if (navigator.vibrate) navigator.vibrate(200);
                    } else {
                        alertBox.style.display = 'none';
                        angleDisplay.style.background = 'rgba(0, 200, 100, 0.8)';
                        statusDiv.textContent = '✅ 正常';
                        statusDiv.style.color = '#00ff88';
                    }
                }
                return;
            }

            // 情况2：只有 Hand
            if (hand && !pose) {
                drawHand(hand, w, h);
                statusDiv.textContent = '请后退，让肩膀入镜';
                statusDiv.style.color = '#ffaa00';
                angleDisplay.textContent = '手腕: --°';
                angleDisplay.style.background = 'rgba(0,0,0,0.7)';
                alertBox.style.display = 'none';
                return;
            }

            // 情况3：只有 Pose
            if (pose && !hand) {
                drawPose(pose, w, h);
                statusDiv.textContent = '请将手放入画面';
                statusDiv.style.color = '#ffaa00';
                angleDisplay.textContent = '手腕: --°';
                angleDisplay.style.background = 'rgba(0,0,0,0.7)';
                alertBox.style.display = 'none';
                return;
            }

            // 情况4：什么都没有
            drawGuide(w, h);
            statusDiv.textContent = '未检测到身体';
            statusDiv.style.color = '#aaa';
            angleDisplay.textContent = '手腕: --°';
            angleDisplay.style.background = 'rgba(0,0,0,0.7)';
            alertBox.style.display = 'none';
        }

        // ========== 计算 ==========
        function mx(p) { return { x: 1 - p.x, y: p.y }; }

        function calcAngle(pose, hand, isLeft) {
            const elbowIdx = isLeft ? 13 : 14;
            const wristIdx = isLeft ? 15 : 16;
            
            if (!pose[elbowIdx] || !pose[wristIdx]) return null;
            
            const elbow = mx(pose[elbowIdx]);
            const wrist = mx(pose[wristIdx]);
            
            const forearm = { x: wrist.x - elbow.x, y: wrist.y - elbow.y };
            
            const mcp9 = mx(hand[9]);
            const mcp13 = mx(hand[13]);
            const handBack = { x: (mcp9.x + mcp13.x) / 2, y: (mcp9.y + mcp13.y) / 2 };
            
            const palm = { x: handBack.x - wrist.x, y: handBack.y - wrist.y };
            
            const dot = forearm.x * palm.x + forearm.y * palm.y;
            const mf = Math.sqrt(forearm.x**2 + forearm.y**2);
            const mp = Math.sqrt(palm.x**2 + palm.y**2);
            
            if (mf === 0 || mp === 0) return null;
            
            const angle = Math.acos(Math.min(1, Math.max(-1, dot/(mf*mp)))) * (180/Math.PI);
            const cross = forearm.x * palm.y - forearm.y * palm.x;
            
            return { angle, isBendingInward: cross < 0, elbow, wrist, handBack };
        }

        // ========== 绘制 ==========
        function drawAll(pose, hand, isLeft, result, w, h) {
            if (result) {
                const shoulder = mx(pose[isLeft ? 11 : 12]);
                
                canvasCtx.strokeStyle = '#00ff00';
                canvasCtx.lineWidth = 6;
                canvasCtx.beginPath();
                canvasCtx.moveTo(shoulder.x * w, shoulder.y * h);
                canvasCtx.lineTo(result.elbow.x * w, result.elbow.y * h);
                canvasCtx.lineTo(result.wrist.x * w, result.wrist.y * h);
                canvasCtx.stroke();
                
                [
                    [shoulder, '#ff0000', 10],
                    [result.elbow, '#ff8800', 12],
                    [result.wrist, '#ff0000', 10]
                ].forEach(([p, c, r]) => {
                    canvasCtx.beginPath();
                    canvasCtx.arc(p.x * w, p.y * h, r, 0, 2*Math.PI);
                    canvasCtx.fillStyle = c;
                    canvasCtx.fill();
                });
            }

            drawHand(hand, w, h);

            if (result && result.handBack) {
                const hw = mx(hand[0]);
                canvasCtx.strokeStyle = '#ff00ff';
                canvasCtx.lineWidth = 4;
                canvasCtx.setLineDash([8, 4]);
                canvasCtx.beginPath();
                canvasCtx.moveTo(hw.x * w, hw.y * h);
                canvasCtx.lineTo(result.handBack.x * w, result.handBack.y * h);
                canvasCtx.stroke();
                canvasCtx.setLineDash([]);
                
                canvasCtx.beginPath();
                canvasCtx.arc(result.handBack.x * w, result.handBack.y * h, 8, 0, 2*Math.PI);
                canvasCtx.fillStyle = '#ff00ff';
                canvasCtx.fill();
            }

            canvasCtx.fillStyle = 'yellow';
            canvasCtx.font = 'bold 16px sans-serif';
            canvasCtx.fillText(`${isLeft?'左':'右'}手 ${result?result.angle.toFixed(1):'--'}°`, 10, 25);
        }

        function drawHand(hand, w, h) {
            const conn = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [0,9],[9,10],[10,11],[11,12],
                [0,13],[13,14],[14,15],[15,16],
                [0,17],[17,18],[18,19],[19,20],
                [5,9],[9,13],[13,17]
            ];

            canvasCtx.strokeStyle = '#00ffff';
            canvasCtx.lineWidth = 3;
            for (const [a, b] of conn) {
                const p1 = mx(hand[a]);
                const p2 = mx(hand[b]);
                canvasCtx.beginPath();
                canvasCtx.moveTo(p1.x * w, p1.y * h);
                canvasCtx.lineTo(p2.x * w, p2.y * h);
                canvasCtx.stroke();
            }

            for (let i = 0; i < hand.length; i++) {
                const p = mx(hand[i]);
                canvasCtx.beginPath();
                canvasCtx.arc(p.x * w, p.y * h, 5, 0, 2*Math.PI);
                canvasCtx.fillStyle = i === 0 ? '#ff0000' : '#00ffff';
                canvasCtx.fill();
            }
        }

        function drawPose(pose, w, h) {
            const conn = [[11,13],[13,15],[12,14],[14,16],[11,12]];
            canvasCtx.strokeStyle = '#0088ff';
            canvasCtx.lineWidth = 5;
            for (const [a, b] of conn) {
                if (pose[a] && pose[b]) {
                    const p1 = mx(pose[a]);
                    const p2 = mx(pose[b]);
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x * w, p1.y * h);
                    canvasCtx.lineTo(p2.x * w, p2.y * h);
                    canvasCtx.stroke();
                }
            }

            canvasCtx.fillStyle = 'white';
            canvasCtx.font = '20px sans-serif';
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText('🙋 检测到身体，请把手放入画面', w/2, h/2);
        }

        function drawGuide(w, h) {
            canvasCtx.strokeStyle = 'rgba(0,255,136,0.4)';
            canvasCtx.lineWidth = 2;
            canvasCtx.setLineDash([10, 10]);
            
            const bw = w * 0.5;
            const bh = h * 0.6;
            const bx = (w - bw) / 2;
            const by = (h - bh) / 2;
            
            canvasCtx.strokeRect(bx, by, bw, bh);
            canvasCtx.setLineDash([]);
            
            canvasCtx.fillStyle = 'rgba(0,255,136,0.6)';
            canvasCtx.font = '16px sans-serif';
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText('请站在框内', w/2, by - 10);
            canvasCtx.fillText('让肩膀和手臂都入镜', w/2, by + bh + 25);
        }

        // ========== 主循环 ==========
        async function processFrame() {
            if (!isRunning) return;
            
            if (videoElement.readyState >= 2 && videoElement.videoWidth > 0) {
                try {
                    await holistic.send({ image: videoElement });
                } catch (e) {
                    log('send错误: ' + e.message);
                }
            }
            
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
