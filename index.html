<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>勾腕识别工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #header {
            padding: 8px;
            text-align: center;
            z-index: 10;
            background: #1a1a2e;
        }
        
        h1 { font-size: 18px; }
        #status { font-size: 12px; color: #aaa; margin-top: 2px; }
        
        #main {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #input_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        
        #output_canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        #alert-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            z-index: 100;
            text-align: center;
            animation: pulse 0.5s infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.05); }
        }
        
        #angle-display {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 50;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        #start-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: #00d4aa;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #debug-info {
            position: fixed;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.85);
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #0f0;
            z-index: 300;
            max-width: 280px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
        }
        
        #guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        
        .guide-box {
            position: absolute;
            border: 2px dashed rgba(0, 255, 136, 0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 style="font-size:28px; margin-bottom:10px;">✍️ 勾腕识别工具</h1>
        <p style="color:#aaa; margin-bottom:10px; padding:0 20px; text-align:center;">
            需要摄像头权限<br>
            请确保摄像头能拍到肩膀和手臂
        </p>
        <button id="start-btn">📷 开启摄像头</button>
    </div>

    <div id="header" style="display:none;">
        <h1>勾腕识别</h1>
        <div id="status">初始化...</div>
    </div>
    
    <div id="main" style="display:none;">
        <video id="input_video" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div id="alert-box">
        ⚠️ 勾腕 detected！<br>
        <span style="font-size:14px">请调整手腕姿势</span>
    </div>
    
    <div id="angle-display">角度: --°</div>
    <div id="debug-info">等待启动...</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const alertBox = document.getElementById('alert-box');
        const angleDisplay = document.getElementById('angle-display');
        const statusDiv = document.getElementById('status');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const mainDiv = document.getElementById('main');
        const headerDiv = document.getElementById('header');
        const debugInfo = document.getElementById('debug-info');

        const GOUWAN_THRESHOLD = 35;
        let isRunning = false;
        let holistic = null;
        let frameCount = 0;

        function log(msg) {
            console.log(msg);
            debugInfo.innerHTML += '<br>' + msg;
            // 保持滚动到底部
            debugInfo.scrollTop = debugInfo.scrollHeight;
        }

        // ========== 启动摄像头 ==========

        startBtn.addEventListener('click', async () => {
            startBtn.textContent = '启动中...';
            startBtn.disabled = true;
            log('请求摄像头...');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });

                log('摄像头获取成功');
                videoElement.srcObject = stream;
                
                await new Promise((resolve, reject) => {
                    videoElement.onloadedmetadata = () => resolve();
                    videoElement.onerror = (e) => reject(e);
                    setTimeout(() => reject(new Error('超时')), 15000);
                });

                await videoElement.play();
                log('视频播放中, 尺寸:' + videoElement.videoWidth + 'x' + videoElement.videoHeight);

                // 设置 canvas
                canvasElement.width = videoElement.videoWidth || 640;
                canvasElement.height = videoElement.videoHeight || 480;
                log('Canvas: ' + canvasElement.width + 'x' + canvasElement.height);

                startScreen.style.display = 'none';
                mainDiv.style.display = 'flex';
                headerDiv.style.display = 'block';
                statusDiv.textContent = '加载模型...';

                // 初始化 Holistic
                initHolistic();

            } catch (err) {
                log('错误: ' + err.name + ' - ' + err.message);
                startBtn.textContent = '启动失败，重试';
                startBtn.disabled = false;
                alert('摄像头启动失败: ' + err.message);
            }
        });

        // ========== 初始化 Holistic ==========

        function initHolistic() {
            try {
                log('创建 Holistic...');
                
                holistic = new Holistic({
                    locateFile: (file) => {
                        log('加载: ' + file);
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
                    }
                });

                holistic.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: false,
                    refineFaceLandmarks: false,  // 不需要面部细节，节省性能
                    minDetectionConfidence: 0.3,   // 降低阈值，提高检测率
                    minTrackingConfidence: 0.3
                });

                // 关键：onResults 回调
                holistic.onResults((results) => {
                    frameCount++;
                    if (frameCount % 30 === 0) {  // 每30帧记录一次
                        log('帧#' + frameCount + ' 回调触发');
                    }
                    
                    // 检查结果
                    const hasPose = results.poseLandmarks && results.poseLandmarks.length > 0;
                    const hasLeftHand = results.leftHandLandmarks && results.leftHandLandmarks.length > 0;
                    const hasRightHand = results.rightHandLandmarks && results.rightHandLandmarks.length > 0;
                    
                    if (frameCount % 30 === 0) {
                        log('Pose:' + hasPose + ' 左手:' + hasLeftHand + ' 右手:' + hasRightHand);
                    }

                    // 处理并绘制
                    processResults(results);
                });

                log('Holistic 初始化完成，开始检测循环');
                isRunning = true;
                statusDiv.textContent = '检测中...';
                processFrame();

            } catch (e) {
                log('Holistic 失败: ' + e.message);
                statusDiv.textContent = '模型加载失败';
            }
        }

        // ========== 处理结果 ==========

        function processResults(results) {
            const w = canvasElement.width;
            const h = canvasElement.height;
            
            // 清除画布
            canvasCtx.clearRect(0, 0, w, h);

            const poseLandmarks = results.poseLandmarks;
            const leftHand = results.leftHandLandmarks;
            const rightHand = results.rightHandLandmarks;

            // 判断是否有有效数据
            let handLandmarks = null;
            let isLeftHand = false;
            
            if (leftHand) {
                handLandmarks = leftHand;
                isLeftHand = true;
            } else if (rightHand) {
                handLandmarks = rightHand;
                isLeftHand = false;
            }

            // 情况1：有 Pose 也有 Hand → 计算勾腕角度
            if (poseLandmarks && handLandmarks) {
                const wristResult = calculateWristBendAngle(poseLandmarks, handLandmarks, isLeftHand);
                drawFullScene(poseLandmarks, handLandmarks, isLeftHand, wristResult, w, h);
                
                if (wristResult) {
                    const angle = wristResult.angle;
                    angleDisplay.textContent = `手腕: ${angle.toFixed(1)}°`;
                    
                    if (angle < (180 - GOUWAN_THRESHOLD) && wristResult.isBendingInward) {
                        alertBox.style.display = 'block';
                        angleDisplay.style.background = 'rgba(255, 0, 0, 0.8)';
                        statusDiv.textContent = '⚠️ 勾腕！';
                        statusDiv.style.color = '#ff4444';
                        if (navigator.vibrate) navigator.vibrate(200);
                    } else {
                        alertBox.style.display = 'none';
                        angleDisplay.style.background = 'rgba(0, 200, 100, 0.8)';
                        statusDiv.textContent = '✅ 正常';
                        statusDiv.style.color = '#00ff88';
                    }
                }
                return;
            }

            // 情况2：只有 Hand，没有 Pose → 提示后退
            if (handLandmarks && !poseLandmarks) {
                drawHandOnly(handLandmarks, w, h);
                statusDiv.textContent = '请后退，让肩膀入镜';
                statusDiv.style.color = '#ffaa00';
                angleDisplay.textContent = '手腕: --°';
                angleDisplay.style.background = 'rgba(0,0,0,0.7)';
                alertBox.style.display = 'none';
                return;
            }

            // 情况3：只有 Pose，没有 Hand → 提示伸手
            if (poseLandmarks && !handLandmarks) {
                drawPoseOnly(poseLandmarks, w, h);
                statusDiv.textContent = '请将手放入画面';
                statusDiv.style.color = '#ffaa00';
                angleDisplay.textContent = '手腕: --°';
                angleDisplay.style.background = 'rgba(0,0,0,0.7)';
                alertBox.style.display = 'none';
                return;
            }

            // 情况4：什么都没有 → 提示
            drawGuide(w, h);
            statusDiv.textContent = '未检测到身体，请调整位置';
            statusDiv.style.color = '#aaa';
            angleDisplay.textContent = '手腕: --°';
            angleDisplay.style.background = 'rgba(0,0,0,0.7)';
            alertBox.style.display = 'none';
        }

        // ========== 计算 ==========

        function mirrorX(point) {
            return { x: 1 - point.x, y: point.y };
        }

        function calculateWristBendAngle(poseLandmarks, handLandmarks, isLeftHand) {
            const elbowIndex = isLeftHand ? 13 : 14;
            const wristIndex = isLeftHand ? 15 : 16;
            
            // 检查关键点是否有效
            if (!poseLandmarks[elbowIndex] || !poseLandmarks[wristIndex]) return null;
            
            const elbow = mirrorX(poseLandmarks[elbowIndex]);
            const wrist = mirrorX(poseLandmarks[wristIndex]);
            
            const forearmVec = {
                x: wrist.x - elbow.x,
                y: wrist.y - elbow.y
            };
            
            const middleMCP = mirrorX(handLandmarks[9]);
            const ringMCP = mirrorX(handLandmarks[13]);
            const handBack = {
                x: (middleMCP.x + ringMCP.x) / 2,
                y: (middleMCP.y + ringMCP.y) / 2
            };
            
            const palmVec = {
                x: handBack.x - wrist.x,
                y: handBack.y - wrist.y
            };
            
            const dot = forearmVec.x * palmVec.x + forearmVec.y * palmVec.y;
            const magForearm = Math.sqrt(forearmVec.x ** 2 + forearmVec.y ** 2);
            const magPalm = Math.sqrt(palmVec.x ** 2 + palmVec.y ** 2);
            
            if (magForearm === 0 || magPalm === 0) return null;
            
            let angle = Math.acos(Math.min(1, Math.max(-1, dot / (magForearm * magPalm)))) * (180 / Math.PI);
            const crossZ = forearmVec.x * palmVec.y - forearmVec.y * palmVec.x;
            
            return { angle, isBendingInward: crossZ < 0, elbow, wrist, handBack };
        }

        // ========== 绘制函数 ==========

        function drawFullScene(poseLandmarks, handLandmarks, isLeftHand, wristResult, w, h) {
            // 手臂
            if (wristResult) {
                const shoulderIndex = isLeftHand ? 11 : 12;
                const shoulder = mirrorX(poseLandmarks[shoulderIndex]);
                
                canvasCtx.strokeStyle = '#0088ff';
                canvasCtx.lineWidth = 5;
                canvasCtx.beginPath();
                canvasCtx.moveTo(shoulder.x * w, shoulder.y * h);
                canvasCtx.lineTo(wristResult.elbow.x * w, wristResult.elbow.y * h);
                canvasCtx.lineTo(wristResult.wrist.x * w, wristResult.wrist.y * h);
                canvasCtx.stroke();
                
                [
                    {p: shoulder, c: '#ff0000', r: 8},
                    {p: wristResult.elbow, c: '#ff8800', r: 10},
                    {p: wristResult.wrist, c: '#ff0000', r: 8}
                ].forEach(({p, c, r}) => {
                    canvasCtx.beginPath();
                    canvasCtx.arc(p.x * w, p.y * h, r, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = c;
                    canvasCtx.fill();
                });
            }

            // 手部
            drawHandBones(handLandmarks, w, h);
            
            // 手掌方向
            if (wristResult && wristResult.handBack) {
                const handWrist = mirrorX(handLandmarks[0]);
                canvasCtx.strokeStyle = '#ff00ff';
                canvasCtx.lineWidth = 3;
                canvasCtx.setLineDash([6, 3]);
                canvasCtx.beginPath();
                canvasCtx.moveTo(handWrist.x * w, handWrist.y * h);
                canvasCtx.lineTo(wristResult.handBack.x * w, wristResult.handBack.y * h);
                canvasCtx.stroke();
                canvasCtx.setLineDash([]);
                
                canvasCtx.beginPath();
                canvasCtx.arc(wristResult.handBack.x * w, wristResult.handBack.y * h, 6, 0, 2 * Math.PI);
                canvasCtx.fillStyle = '#ff00ff';
                canvasCtx.fill();
            }

            // 文字
            canvasCtx.fillStyle = 'yellow';
            canvasCtx.font = 'bold 14px sans-serif';
            const label = isLeftHand ? '左手' : '右手';
            canvasCtx.fillText(`${label} ${wristResult ? wristResult.angle.toFixed(1) : '--'}°`, 10, 20);
        }

        function drawHandOnly(handLandmarks, w, h) {
            drawHandBones(handLandmarks, w, h);
            
            canvasCtx.fillStyle = 'white';
            canvasCtx.font = '18px sans-serif';
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText('✋ 检测到手，但缺少手臂', w/2, h/2 - 30);
            canvasCtx.fillText('请后退，让肩膀入镜', w/2, h/2);
        }

        function drawPoseOnly(poseLandmarks, w, h) {
            // 画骨架
            const connections = [
                [11,13],[13,15],[12,14],[14,16],  // 手臂
                [11,12],[23,24],[11,23],[12,24]      // 躯干
            ];
            
            canvasCtx.strokeStyle = '#0088ff';
            canvasCtx.lineWidth = 4;
            for (const [a, b] of connections) {
                if (poseLandmarks[a] && poseLandmarks[b]) {
                    const p1 = mirrorX(poseLandmarks[a]);
                    const p2 = mirrorX(poseLandmarks[b]);
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x * w, p1.y * h);
                    canvasCtx.lineTo(p2.x * w, p2.y * h);
                    canvasCtx.stroke();
                }
            }

            canvasCtx.fillStyle = 'white';
            canvasCtx.font = '18px sans-serif';
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText('🙋 检测到身体，但缺少手部', w/2, h/2 - 30);
            canvasCtx.fillText('请将手放入画面', w/2, h/2);
        }

        function drawHandBones(handLandmarks, w, h) {
            const connections = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [0,9],[9,10],[10,11],[11,12],
                [0,13],[13,14],[14,15],[15,16],
                [0,17],[17,18],[18,19],[19,20],
                [5,9],[9,13],[13,17]
            ];

            canvasCtx.strokeStyle = '#00ff88';
            canvasCtx.lineWidth = 2;
            for (const [start, end] of connections) {
                const p1 = mirrorX(handLandmarks[start]);
                const p2 = mirrorX(handLandmarks[end]);
                canvasCtx.beginPath();
                canvasCtx.moveTo(p1.x * w, p1.y * h);
                canvasCtx.lineTo(p2.x * w, p2.y * h);
                canvasCtx.stroke();
            }

            for (let i = 0; i < handLandmarks.length; i++) {
                const p = mirrorX(handLandmarks[i]);
                canvasCtx.beginPath();
                canvasCtx.arc(p.x * w, p.y * h, 4, 0, 2 * Math.PI);
                canvasCtx.fillStyle = i === 0 ? '#ff4444' : '#00ffff';
                canvasCtx.fill();
            }
        }

        function drawGuide(w, h) {
            canvasCtx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
            canvasCtx.lineWidth = 2;
            canvasCtx.setLineDash([10, 10]);
            
            // 画一个框表示应该站的位置
            const boxW = w * 0.6;
            const boxH = h * 0.7;
            const boxX = (w - boxW) / 2;
            const boxY = (h - boxH) / 2;
            
            canvasCtx.strokeRect(boxX, boxY, boxW, boxH);
            canvasCtx.setLineDash([]);
            
            canvasCtx.fillStyle = 'rgba(0, 255, 136, 0.5)';
            canvasCtx.font = '16px sans-serif';
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText('请站在框内', w/2, boxY - 10);
            canvasCtx.fillText('让肩膀和手臂都入镜', w/2, boxY + boxH + 25);
        }

        // ========== 主循环 ==========

        async function processFrame() {
            if (!isRunning) return;

            if (videoElement.readyState >= 2 && videoElement.videoWidth > 0) {
                try {
                    if (holistic) {
                        await holistic.send({ image: videoElement });
                    }
                } catch (e) {
                    log('帧错误: ' + e.message);
                }
            }
            
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
